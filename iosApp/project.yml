name: DeckPuller
options:
  bundleIdPrefix: com
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
targets:
  DeckPuller:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: DeckPuller
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMotionUsageDescription: "Used to tilt and shimmer cards as you move your phone."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deckpuller
        # CI builds unsigned; SideStore re-signs with a free Apple ID at install time.
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        # Let the Gradle build-phase script run.
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    preBuildScripts:
      - name: Build Kotlin framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
    dependencies:
      - framework: $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework
        embed: true
