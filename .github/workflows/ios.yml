name: iOS

on:
  push:
    branches: [ ios-port-kmp, main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile:
    name: Compile shared framework
    runs-on: macos-14            # Apple-silicon runner, Xcode preinstalled
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile shared for iOS (device + simulator)
        run: ./gradlew :shared:compileKotlinIosArm64 :shared:compileKotlinIosSimulatorArm64

  ipa:
    name: Build unsigned .ipa
    runs-on: macos-14
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate
      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project iosApp/DeckPuller.xcodeproj \
            -scheme DeckPuller \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
      - name: Package unsigned .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/DeckPuller.app Payload/
          zip -r DeckPuller-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: DeckPuller-unsigned-ipa
          path: DeckPuller-unsigned.ipa
