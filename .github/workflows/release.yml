name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/publish (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (versionName=$VERSION, versionCode=${{ github.run_number }})"

      - name: Decode signing keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "signing=true" >> "$GITHUB_OUTPUT"
            echo "Signing keystore decoded."
          else
            echo "signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::KEYSTORE_BASE64 secret is not set — release artifacts will be UNSIGNED and cannot be installed/published as-is. See docs/RELEASING.md."
          fi

      - name: Build release APK + AAB
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease \
            -PversionName="${{ steps.ver.outputs.version }}" \
            -PversionCode="${{ steps.ver.outputs.code }}" \
            --stacktrace

      - name: Collect & name artifacts
        id: artifacts
        run: |
          mkdir -p release
          APK="$(ls app/build/outputs/apk/release/*.apk | head -n1)"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          cp "$APK" "release/DeckPuller-${{ steps.ver.outputs.version }}.apk"
          cp "$AAB" "release/DeckPuller-${{ steps.ver.outputs.version }}.aab"
          ls -la release

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: DeckPuller ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/DeckPuller-*.apk
            release/DeckPuller-*.aab
